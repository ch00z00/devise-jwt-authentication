default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: root
  host: localhost

development:
  <<: *default
  database: devise_jwt_authentication_development

test:
  <<: *default
  database: devise_jwt_authentication_test

production:
  primary: &primary_production
    <<: *default
    database: devise_jwt_authentication_production
    username: devise_jwt_authentication
    password: <%= ENV["DEVISE_JWT_AUTHENTICATION_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: devise_jwt_authentication_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: devise_jwt_authentication_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: devise_jwt_authentication_production_cable
    migrations_paths: db/cable_migrate
